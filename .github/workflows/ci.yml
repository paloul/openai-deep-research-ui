name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  format:
    name: Format check (black + ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - run: pip install black ruff
      - run: black --check .
      - run: ruff check .

  typecheck:
    name: Typecheck (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - run: pip install -e ".[dev]" types-requests
      - run: mypy .

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Run pytest
        # Exit 5 = no tests collected; treat as success until tests are added.
        run: |
          set +e
          pytest
          status=$?
          if [ $status -eq 5 ]; then
            echo "No tests collected — passing."
            exit 0
          fi
          exit $status
