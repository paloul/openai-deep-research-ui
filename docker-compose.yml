services:
  open-deep-research:
    build: .
    container_name: open-deep-research
    ports:
      - "5080:5080"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5080/', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
